<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecurePass Toolkit</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>🔐 SecurePass Toolkit</h1>

        <!-- Password section -->
        <section class="section">

            <h2>Password Strength Checker</h2>

            <input
                type="password"
                id="password"
                placeholder="Enter your password">

            <div class="button-group">
                <button id="togglePassword">Show Password</button>
            </div>

            <p id="strength">Strength:</p>

        </section>

        <hr>

        <!-- Hash generator section -->
        <section class="section">

            <h2>SHA-256 Hash Generator</h2>

            <textarea
                id="hashInput"
                rows="5"
                placeholder="Enter text to hash"></textarea>

            <div class="button-group">
                <button id="generateHash">Generate Hash</button>
            </div>

            <textarea
                id="hashOutput"
                rows="5"
                placeholder="Hash will appear here..."
                readonly></textarea>

            <div class="button-group">
                <button id="copyHash">Copy Hash</button>
            </div>

        </section>

    </div>

    <!-- JavaScript -->
    <script src="script.js"></script>

</body>
</html>
